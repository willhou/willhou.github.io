  <rect x="20" y="310" width="220" height="6" rx="3" fill="#888"/>
  <rect x="20" y="324" width="200" height="6" rx="3" fill="#888"/>
  <rect x="20" y="338" width="240" height="6" rx="3" fill="#888"/>
  <rect x="20" y="360" width="180" height="6" rx="3" fill="#BBB"/>
  <rect x="20" y="374" width="240" height="6" rx="3" fill="#BBB"/>
  <rect x="20" y="388" width="200" height="6" rx="3" fill="#BBB"/>
  <rect x="20" y="402" width="230" height="6" rx="3" fill="#BBB"/>
  <!-- Bottom nav -->
  <rect x="0" y="458" width="280" height="42" fill="#FAFAFA"/>
